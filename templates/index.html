<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>APS 专业排产看板</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment-with-locales.min.js"></script>
    <script src="https://unpkg.com/vis-timeline@latest/standalone/umd/vis-timeline-graph2d.min.js"></script>
    <link href="https://unpkg.com/vis-timeline@latest/styles/vis-timeline-graph2d.min.css" rel="stylesheet" />

    <style>
        body { background-color: #f8f9fa; }
        #visualization { background-color: white; border: 1px solid #ddd; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .vis-item { border-color: transparent; border-radius: 2px; font-size: 12px; color: white; display: flex; align-items: center; padding-left: 5px; }
        
        .vis-item-blue { background-color: #3498db; border-left: 4px solid #2980b9; }
        .vis-item-red  { background-color: #e74c3c; border-left: 4px solid #c0392b; } 
        .vis-item-dark { background-color: #34495e; border-left: 4px solid #2c3e50; } 
        .vis-item-striped { background: repeating-linear-gradient(45deg,#606dbc,#606dbc 10px,#465298 10px,#465298 20px); border-left: 4px solid #333; }
        .vis-item-warning { background-color: #f39c12 !important; border-left: 5px solid #d35400 !important; color: #fff !important; }
        
        /* 阶段四核心：严重违规报错 (A/B 面 48H) */
        .vis-item-error { background-color: #8b0000 !important; border: 2px dashed #ff4500 !important; color: #fff !important; font-weight: bold; animation: blink 1s infinite;}
        @keyframes blink { 50% { opacity: 0.7; } }

        /* 阶段四核心：设备保养阴影背景 */
        .vis-item-maintenance { background: repeating-linear-gradient(45deg, rgba(169,169,169,0.3), rgba(169,169,169,0.3) 10px, rgba(0,0,0,0.1) 10px, rgba(0,0,0,0.1) 20px) !important; border: none !important;}

        .toolbar { background: #fff; padding: 15px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="toolbar sticky-top">
    <div class="d-flex align-items-center">
        <h4 class="m-0 me-4 text-primary"><i class="fas fa-industry"></i> APS 排产看板</h4>
        <button class="btn btn-outline-danger btn-sm me-2" data-bs-toggle="modal" data-bs-target="#maintenanceModal"><i class="fas fa-tools"></i> 异常/停机录入</button>
        <a href="/manage" class="btn btn-outline-dark btn-sm">⚙️ 数据管理</a>
    </div>
    <div>
        <div class="text-muted small mb-1 text-end">
            <span class="badge bg-secondary">■ 锁定</span> 
            <span class="badge bg-warning text-dark">■ 时间不足</span> 
            <span class="badge" style="background:#8b0000">■ 违反时序约束</span>
            <span class="badge" style="background:#ccc; color:#333;">▧ 设备停机</span>
        </div>
        <div class="input-group input-group-sm d-inline-flex w-auto me-2">
            <select class="form-select" id="algoSelect">
                <option value="greedy">⚡ 极速贪婪</option>
                <option value="ga">🧬 遗传算法</option>
            </select>
        </div>
        <div class="btn-group">
            <button id="btnRunOfficial" onclick="runSchedule('OFFICIAL')" class="btn btn-primary btn-sm">▶ 正式排产</button>
            <button id="btnRunSim" onclick="runSchedule('SIMULATION')" class="btn btn-warning btn-sm">🧪 模拟</button>
        </div>
    </div>
</div>

<div class="container-fluid mt-3">
    <div id="visualization"></div>
</div>

<div class="modal fade" id="maintenanceModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title"><i class="fas fa-tools"></i> 录入设备异常/停机时间</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="maintenanceForm">
                    <div class="mb-3">
                        <label class="form-label fw-bold">停机产线</label>
                        <select class="form-select" id="maint_line_id">
                            {% for r in resources %}
                            <option value="{{r.id}}">{{r.name}}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">类型</label>
                        <select class="form-select" id="maint_type">
                            <option value="EXCEPTION">🔴 设备异常 (故障)</option>
                            <option value="MAINTENANCE">🟠 例行保养 (计划内)</option>
                        </select>
                    </div>
                    <div class="row mb-3">
                        <div class="col-6"><label>开始时间</label><input type="datetime-local" class="form-control" id="maint_start"></div>
                        <div class="col-6"><label>结束时间</label><input type="datetime-local" class="form-control" id="maint_end"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">备注原因</label>
                        <input type="text" class="form-control" id="maint_reason" placeholder="例如：贴片机换料、轨道卡板等">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-danger" onclick="saveMaintenance()">确认停机时间</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let timeline, itemsObj, groupsObj;

    document.addEventListener('DOMContentLoaded', function() {
        moment.locale('zh-cn');
        initTimeline();
        loadData();
    });

    function initTimeline() {
        const container = document.getElementById('visualization');
        itemsObj = new vis.DataSet([]); groupsObj = new vis.DataSet([]);
        const options = {
            locale: 'zh-cn', snap: null, stack: true, orientation: 'top',
            editable: { updateGroup: true, updateTime: true },
            onMove: function (item, callback) { updateTask(item); callback(item); }
        };
        timeline = new vis.Timeline(container, itemsObj, groupsObj, options);
    }

    function loadData() {
        fetch('/api/schedule_data').then(r => r.json()).then(data => {
            groupsObj.clear(); groupsObj.add(data.groups);
            itemsObj.clear(); itemsObj.add(data.items);
            timeline.fit();
        });
    }

    function updateTask(item) {
        let payload = {
            task_id: item.id, resource_id: item.group, 
            planned_start: moment(item.start).format('YYYY-MM-DD HH:mm'), 
            planned_end: moment(item.end).format('YYYY-MM-DD HH:mm'), 
            is_locked: 1 
        };
        fetch('/api/update_order_manual', {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
        }).then(r => r.json()).then(d => loadData());
    }

    window.runSchedule = function(mode) {
        let selectObj = document.getElementById('algoSelect');
        fetch('/api/run', {
            method:'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ mode: mode, algorithm: selectObj.value })
        }).then(r => r.json()).then(d => { alert(d.message); loadData(); });
    }

    // 提交保养记录
    window.saveMaintenance = function() {
        let payload = {
            line_id: document.getElementById('maint_line_id').value,
            type: document.getElementById('maint_type').value,
            start_time: document.getElementById('maint_start').value,
            end_time: document.getElementById('maint_end').value,
            reason: document.getElementById('maint_reason').value
        };
        if(!payload.start_time || !payload.end_time) return alert("请填写完整时间");

        fetch('/api/maintenance', {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
        }).then(r => r.json()).then(d => {
            if(d.success) {
                bootstrap.Modal.getInstance(document.getElementById('maintenanceModal')).hide();
                loadData();
            } else alert("保存失败: " + d.message);
        });
    }
</script>
</body>
</html>
