<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>总装车间看板 - MyAPS</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏭</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0d1117; color: #e6edf3; }
        .navbar { background: linear-gradient(90deg, #1a1a2e 0%, #16213e 100%); }
        .stat-card { 
            background: linear-gradient(135deg, #d97706 0%, #f59e0b 100%); 
            border-radius: 12px; padding: 20px; color: white;
            margin-bottom: 20px;
        }
        .stat-card.warning { background: linear-gradient(135deg, #9e6a03 0%, #d29922 100%); }
        .stat-card.danger { background: linear-gradient(135deg, #da3633 0%, #f85149 100%); }
        .stat-card.info { background: linear-gradient(135deg, #1f6feb 0%, #388bfd 100%); }
        .table-dark { background-color: #161b22; }
        .work-order-card {
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }
        .work-order-card.pending { border-left: 4px solid #d29922; }
        .work-order-card.in-progress { border-left: 4px solid #238636; }
    </style>
    <meta http-equiv="refresh" content="30">
</head>
<body>

<nav class="navbar navbar-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">
            <i class="fas fa-tools"></i> 总装车间看板
        </span>
        <span class="text-muted">
            <i class="fas fa-clock"></i> <span id="currentTime"></span>
        </span>
    </div>
</nav>

<div class="container-fluid px-4">
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="stat-card">
                <h6><i class="fas fa-tasks"></i> 待排产</h6>
                <h2 id="stat-pending">-</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card info">
                <h6><i class="fas fa-play"></i> 生产中</h6>
                <h2 id="stat-running">-</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card warning">
                <h6><i class="fas fa-exclamation-triangle"></i> 即将到期</h6>
                <h2 id="stat-urgent">-</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card danger">
                <h6><i class="fas fa-check-circle"></i> 已完成</h6>
                <h2 id="stat-completed">-</h2>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="card bg-dark">
                <div class="card-header">
                    <h5 class="mb-0"><i class="fas fa-list"></i> 待排产工单</h5>
                </div>
                <div class="card-body" id="pendingOrders"></div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card bg-dark">
                <div class="card-header">
                    <h5 class="mb-0"><i class="fas fa-running"></i> 生产中工单</h5>
                </div>
                <div class="card-body" id="runningOrders"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function updateTime() {
    document.getElementById('currentTime').textContent = new Date().toLocaleString('zh-CN');
}
updateTime();
setInterval(updateTime, 1000);

function loadData() {
    fetch('/api/orders/by_workshop/ASSEMBLY')
        .then(res => res.json())
        .then(orders => {
            const pending = orders.filter(o => o.status === 'Pending');
            const running = orders.filter(o => o.status === 'In Progress');
            const completed = orders.filter(o => o.status === 'Completed');
            
            document.getElementById('stat-pending').textContent = pending.length;
            document.getElementById('stat-running').textContent = running.length;
            document.getElementById('stat-completed').textContent = completed.length;
            
            document.getElementById('pendingOrders').innerHTML = pending.slice(0, 10).map(o => `
                <div class="work-order-card pending">
                    <strong>${o.task_id}</strong>
                    <div class="text-muted mt-1">${o.product_code} x ${o.qty}</div>
                </div>
            `).join('');
            
            document.getElementById('runningOrders').innerHTML = running.slice(0, 10).map(o => `
                <div class="work-order-card in-progress">
                    <strong>${o.task_id}</strong>
                    <div class="text-muted mt-1">${o.resource_id}</div>
                </div>
            `).join('');
        });
}
loadData();
</script>
</body>
</html>
