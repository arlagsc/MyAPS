<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>系统配置中心 - MyAPS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f4f6f9; }
        .config-header { background: #2c3e50; color: white; padding: 20px 30px; border-radius: 0 0 15px 15px; margin-bottom: 30px;}
        .nav-pills .nav-link { color: #2c3e50; font-weight: 500; border-radius: 8px; margin-bottom: 10px;}
        .nav-pills .nav-link.active { background-color: #3498db; }
        .card { border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-radius: 12px; }
        .badge-weekend { background-color: #e74c3c; color: white; }
        .badge-workday { background-color: #2ecc71; color: white; }
    </style>
</head>
<body>

<div class="config-header d-flex justify-content-between align-items-center">
    <h3 class="m-0"><i class="fas fa-cogs me-2"></i>系统配置中心</h3>
    <a href="/" class="btn btn-outline-light btn-sm"><i class="fas fa-arrow-left"></i> 返回看板</a>
</div>

<div class="container">
    <div class="row">
        <div class="col-md-3">
            <div class="card p-3">
                <div class="nav flex-column nav-pills" role="tablist" aria-orientation="vertical">
                    <button class="nav-link text-start active" data-bs-toggle="pill" data-bs-target="#tab-reset" type="button">
                        <i class="fas fa-sync-alt me-2"></i> 接口与重置
                    </button>
                    <button class="nav-link text-start" data-bs-toggle="pill" data-bs-target="#tab-calendar" type="button" onclick="loadCalendar()">
                        <i class="fas fa-calendar-alt me-2"></i> 工厂日历管理
                    </button>
                </div>
            </div>
        </div>

        <div class="col-md-9">
            <div class="tab-content">
                
                <div class="tab-pane fade show active" id="tab-reset">
                    <div class="card">
                        <div class="card-body p-4">
                            <h5 class="card-title text-danger mb-4"><i class="fas fa-exclamation-triangle me-2"></i>危险操作区</h5>
                            <p class="text-muted">点击下方按钮将清空所有排产数据，并重新通过 API 从 MES/SAP 系统拉取并拆分最新的工单。</p>
                            
                            <a href="/manage/reset" class="btn btn-danger btn-lg mt-2" onclick="return confirm('警告：此操作不可逆！\n所有手动锁定的计划、排产记录均会被清空！\n确定要继续吗？')">
                                <i class="fas fa-satellite-dish me-2"></i> 执行系统重置 (同步新数据)
                            </a>

                            <div class="mt-4" id="alertMsg"></div>
                        </div>
                    </div>
                </div>

                <div class="tab-pane fade" id="tab-calendar">
                    <div class="card">
                        <div class="card-body p-4">
                            <h5 class="card-title mb-4"><i class="fas fa-calendar-check me-2"></i>车间排产日历</h5>
                            
                            <div class="row mb-3 align-items-end">
                                <div class="col-md-4">
                                    <label class="form-label text-muted">选择车间</label>
                                    <select class="form-select" id="calWorkshop" onchange="loadCalendar()">
                                        <option value="SMT">SMT 车间</option>
                                        <option value="DIP">DIP 车间</option>
                                        <option value="ASSEMBLY">总装 车间</option>
                                    </select>
                                </div>
                                <div class="col-md-8 text-end">
                                    <button class="btn btn-primary btn-sm me-2" onclick="generateCalendar()"><i class="fas fa-magic"></i> 自动生成未来30天</button>
                                    <button class="btn btn-success btn-sm me-2" onclick="exportCalendar()"><i class="fas fa-file-export"></i> 导出 CSV</button>
                                    
                                    <input type="file" id="importCsvFile" accept=".csv" style="display: none;" onchange="importCalendar(this)">
                                    <button class="btn btn-warning btn-sm text-dark" onclick="document.getElementById('importCsvFile').click()"><i class="fas fa-file-import"></i> 导入 CSV 修改</button>
                                </div>
                            </div>

                            <div class="table-responsive" style="max-height: 500px; overflow-y: auto;">
                                <table class="table table-hover table-bordered text-center align-middle text-nowrap">
                                    <thead class="table-light" style="position: sticky; top: 0; z-index: 1;">
                                        <tr>
                                            <th>日期</th>
                                            <th>状态</th>
                                            <th>早班开始</th>
                                            <th>晚班结束</th>
                                            <th>备注</th>
                                        </tr>
                                    </thead>
                                    <tbody id="calendarTableBody">
                                        </tbody>
                                </table>
                            </div>

                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // 检查重置后的 URL 参数提示
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const alertDiv = document.getElementById('alertMsg');
        if (urlParams.get('reset') === 'ok') {
            alertDiv.innerHTML = `<div class="alert alert-success"><i class="fas fa-check-circle me-2"></i>重置成功！已重新拉取并拆分 <b>${urlParams.get('count')}</b> 个工序级工单。</div>`;
        } else if (urlParams.get('reset') === 'fail') {
            alertDiv.innerHTML = `<div class="alert alert-danger"><i class="fas fa-times-circle me-2"></i>重置失败：${urlParams.get('msg')}</div>`;
        }
    }

    // --- 日历管理逻辑 ---
    function loadCalendar() {
        const workshop = document.getElementById('calWorkshop').value;
        // 【核心修复】：加上时间戳，强制浏览器不使用缓存，每次都去后端拉取最新数据
        fetch(`/api/calendar/list?workshop=${workshop}&_t=${new Date().getTime()}`)
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('calendarTableBody');
                if(data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="text-muted py-4">未找到日历数据，请点击"自动生成"进行初始化。</td></tr>`;
                    return;
                }
                let html = '';
                data.forEach(row => {
                    const isWork = row.is_workday === 1;
                    const badge = isWork ? '<span class="badge badge-workday">工作日</span>' : '<span class="badge badge-weekend">休 息</span>';
                    html += `<tr>
                        <td class="fw-bold">${row.calendar_date}</td>
                        <td>${badge}</td>
                        <td class="${!isWork?'text-muted':''}">${isWork ? row.work_start_time : '-'}</td>
                        <td class="${!isWork?'text-muted':''}">${isWork ? row.work_end_time : '-'}</td>
                        <td class="text-muted small">${row.notes || ''}</td>
                    </tr>`;
                });
                tbody.innerHTML = html;
            });
    }

    function generateCalendar() {
        const workshop = document.getElementById('calWorkshop').value;
        // 注意：这里改成调用 /build 这个全新的防冲突接口
        fetch('/api/calendar/build', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ workshop: workshop, days: 30 })
        }).then(res => res.json()).then(data => {
            alert(data.message);
            loadCalendar();
        }).catch(err => {
            alert('网络请求失败，请检查终端日志: ' + err);
        });
    }
    function exportCalendar() {
        const workshop = document.getElementById('calWorkshop').value;
        // 【修改点】：换成全新的 download_csv 路由
        window.location.href = `/api/calendar/download_csv?workshop=${workshop}`;
    }

    function importCalendar(input) {
        if (!input.files || input.files.length === 0) return;
        const formData = new FormData();
        formData.append('file', input.files[0]);

        // 【修改点】：换成全新的 upload_csv 路由
        fetch('/api/calendar/upload_csv', {
            method: 'POST',
            body: formData
        }).then(res => res.json()).then(data => {
            alert(data.message);
            input.value = ''; // 清空选择
            loadCalendar();
        }).catch(err => alert('导入失败:' + err));
    }
</script>
</body>
</html>
