<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>{{ workshop_name }} - MyAPS</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏭</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>

    <style>
        :root {
            --primary-color: #238636;
            --secondary-color: #8957e5;
            --warning-color: #d97706;
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --border-color: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
        }
        
        body { background-color: var(--bg-dark); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .navbar-custom { background: linear-gradient(90deg, #1a1a2e 0%, #16213e 100%); padding: 15px 20px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; transition: transform 0.2s, box-shadow 0.2s; }
        .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
        .stat-card .stat-icon { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .stat-card .stat-value { font-size: 32px; font-weight: 700; margin: 10px 0 5px; }
        .stat-card .stat-label { color: var(--text-secondary); font-size: 14px; }
        .card-custom { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; margin-bottom: 24px;}
        .card-custom .card-header { background: transparent; border-bottom: 1px solid var(--border-color); padding: 15px 20px; font-weight: 600; }
        .card-custom .card-body { padding: 15px; }
        .work-order-item { background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px 15px; margin-bottom: 10px; transition: all 0.2s; }
        .work-order-item:hover { background: rgba(255,255,255,0.06); border-color: var(--primary-color); }
        .work-order-item .wo-id { font-weight: 600; color: var(--text-primary); }
        .work-order-item .wo-product { color: var(--text-secondary); font-size: 13px; }
        .line-status { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
        .line-status.idle { background: #8b949e; }
        .line-status.running { background: #238636; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        /* 矩阵表专属样式 (类 Excel) */
        .table-matrix-wrapper { overflow-x: auto; max-height: 600px; }
        .table-matrix { border-collapse: separate; border-spacing: 0; min-width: 1800px; color: var(--text-primary); font-size: 12px;}
        .table-matrix th, .table-matrix td { border: 1px solid #30363d; padding: 6px 10px; vertical-align: middle; white-space: nowrap; }
        .table-matrix thead th { background: #21262d; color: #c9d1d9; position: sticky; top: 0; z-index: 10; font-weight: normal; }
        
        /* 冻结前五列 */
        .sticky-col-1 { position: sticky; left: 0; background: #161b22; z-index: 5; font-weight: bold;}
        .sticky-col-2 { position: sticky; left: 100px; background: #161b22; z-index: 5; }
        .sticky-col-3 { position: sticky; left: 240px; background: #161b22; z-index: 5; }
        .sticky-col-4 { position: sticky; left: 340px; background: #161b22; z-index: 5; text-align: center;}
        .sticky-col-5 { position: sticky; left: 400px; background: #161b22; z-index: 5; border-right: 2px solid #238636 !important;}
        
        .table-matrix thead .sticky-col-1, .table-matrix thead .sticky-col-2, .table-matrix thead .sticky-col-3, .table-matrix thead .sticky-col-4, .table-matrix thead .sticky-col-5 { z-index: 15; background: #21262d;}
        
        /* 数据高亮背景 */
        .cell-qty { background-color: #d97706; color: #fff; font-weight: bold; text-align: center; }
        .table-matrix tbody tr:hover td { background-color: #30363d; }
        .table-matrix tbody tr:hover .cell-qty { background-color: #f59e0b; }

        .btn-workshop { background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-primary); padding: 8px 16px; border-radius: 8px; text-decoration: none; transition: all 0.2s; }
        .btn-workshop:hover { background: var(--border-color); color: white; }
    </style>
</head>
<body>

<nav class="navbar-custom d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center">
        <a href="/" class="btn-workshop me-3"><i class="fas fa-arrow-left"></i> 返回</a>
        <h4 class="mb-0"><i class="fas fa-industry me-2"></i><span id="workshopTitle">{{ workshop_name }}</span></h4>
        <span class="badge bg-secondary ms-3" id="workshopCode">{{ workshop_code }}</span>
    </div>
    <div class="d-flex align-items-center">
        <div class="text-end me-4">
            <div class="text-muted small">当前时间</div>
            <div id="currentTime" style="font-weight: 600;"></div>
        </div>
        <a href="/" class="btn-workshop"><i class="fas fa-home"></i> 总看板</a>
    </div>
</nav>

<div class="container-fluid p-4">
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="stat-card" style="border-left: 4px solid #238636;">
                <div class="d-flex justify-content-between align-items-start">
                    <div><div class="stat-label">待排产</div><div class="stat-value" id="statPending">-</div></div>
                    <div class="stat-icon" style="background: rgba(35,134,54,0.2); color: #238636;"><i class="fas fa-clock"></i></div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card" style="border-left: 4px solid #1f6feb;">
                <div class="d-flex justify-content-between align-items-start">
                    <div><div class="stat-label">生产中</div><div class="stat-value" id="statRunning">-</div></div>
                    <div class="stat-icon" style="background: rgba(31,111,235,0.2); color: #1f6feb;"><i class="fas fa-cog fa-spin"></i></div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card" style="border-left: 4px solid #d97706;">
                <div class="d-flex justify-content-between align-items-start">
                    <div><div class="stat-label">即将到期</div><div class="stat-value" id="statUrgent">-</div></div>
                    <div class="stat-icon" style="background: rgba(217,119,6,0.2); color: #d97706;"><i class="fas fa-exclamation-triangle"></i></div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card" style="border-left: 4px solid #8b949e;">
                <div class="d-flex justify-content-between align-items-start">
                    <div><div class="stat-label">已完成</div><div class="stat-value" id="statCompleted">-</div></div>
                    <div class="stat-icon" style="background: rgba(139,148,158,0.2); color: #8b949e;"><i class="fas fa-check-circle"></i></div>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card-custom">
                <div class="card-header d-flex justify-content-between align-items-center" style="background:#1a2332;">
                    <span><i class="fas fa-calendar-alt me-2 text-warning"></i>生产计划矩阵表 (按天分布)</span>
                    <div>
                        <button class="btn btn-sm btn-success me-2" onclick="exportExcel()"><i class="fas fa-file-excel"></i> 导出 Excel 排产单</button>
                        <button class="btn btn-sm btn-outline-success" onclick="loadMatrix()"><i class="fas fa-sync"></i> 刷新矩阵</button>
                    </div>
                </div>
                <div class="card-body p-0 table-matrix-wrapper">
                    <table class="table-matrix w-100" id="matrixTable">
                        <thead id="matrixTableHead">
                            </thead>
                        <tbody id="matrixTableBody">
                            <tr><td colspan="20" class="text-center py-4">数据加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="row mt-2">
        <div class="col-md-6">
            <div class="card-custom h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span><i class="fas fa-server me-2"></i>产线状态</span>
                    <span class="text-muted small" id="lineCount">0 条产线</span>
                </div>
                <div class="card-body">
                    <div class="row" id="lineStatusGrid"></div>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card-custom h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span><i class="fas fa-play-circle me-2"></i>今日生产中工单</span>
                    <span class="badge bg-success" id="runningCount">0</span>
                </div>
                <div class="card-body" id="runningOrdersList" style="max-height: 400px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const workshopCode = '{{ workshop_code }}';

function updateTime() { document.getElementById('currentTime').textContent = new Date().toLocaleString('zh-CN'); }
updateTime(); setInterval(updateTime, 1000);

// === 加载排产矩阵 (核心) ===
async function loadMatrix() {
    try {
        const res = await fetch(`/api/schedule_matrix/${workshopCode}`);
        const data = await res.json();
        const dates = data.dates;
        const orders = data.orders;

        // 生成表头 (类 Excel 格式)
        const daysCN = ['日','一','二','三','四','五','六'];
        let theadHtml = `<tr>
            <th class="sticky-col-1" style="min-width: 100px;">订单</th>
            <th class="sticky-col-2" style="min-width: 140px;">工单号</th>
            <th class="sticky-col-3" style="min-width: 100px;">组件/品号</th>
            <th class="sticky-col-4" style="min-width: 60px;">线别</th>
            <th class="sticky-col-5" style="min-width: 60px;">批量</th>`;
        
        dates.forEach(d => {
            let dateObj = new Date(d);
            let md = `${dateObj.getMonth()+1}/${dateObj.getDate()}`;
            let dayStr = `星期${daysCN[dateObj.getDay()]}`;
            theadHtml += `<th class="text-center" style="min-width: 60px;">${md}<br><small style="font-size:10px; color:#8b949e;">${dayStr}</small></th>`;
        });
        theadHtml += `</tr>`;
        document.getElementById('matrixTableHead').innerHTML = theadHtml;

        // 生成表体数据
        let tbodyHtml = '';
        if(orders.length === 0) {
            tbodyHtml = `<tr><td colspan="${5 + dates.length}" class="text-center py-4 text-muted">暂无排产计划</td></tr>`;
        } else {
            orders.forEach(o => {
                let badgeColor = o.resource_id.startsWith('S') ? 'bg-primary' : 'bg-secondary';
                tbodyHtml += `<tr>
                    <td class="sticky-col-1 text-info">${o.job_id || '-'}</td>
                    <td class="sticky-col-2">${o.task_id}</td>
                    <td class="sticky-col-3" title="${o.component_desc}">${o.product_code} ${o.smt_side !== '-' ? '('+o.smt_side+')' : ''}</td>
                    <td class="sticky-col-4"><span class="badge ${badgeColor}">${o.resource_id}</span></td>
                    <td class="sticky-col-5 fw-bold">${o.qty}</td>`;

                dates.forEach(d => {
                    let dailyQty = o.daily_dist[d];
                    if (dailyQty) {
                        // 有数量则高亮显示黄色/橙色单元格
                        tbodyHtml += `<td class="cell-qty">${dailyQty}</td>`;
                    } else {
                        // 无数量显示空白
                        tbodyHtml += `<td class="text-center text-muted" style="opacity: 0.2;">-</td>`;
                    }
                });
                tbodyHtml += `</tr>`;
            });
        }
        document.getElementById('matrixTableBody').innerHTML = tbodyHtml;
    } catch(e) {
        console.error("加载矩阵失败:", e);
        document.getElementById('matrixTableBody').innerHTML = `<tr><td colspan="20" class="text-danger text-center">数据加载失败</td></tr>`;
    }
}

// === 加载概览统计和进行中列表 ===
async function loadOverview() {
    try {
        const response = await fetch(`/api/orders/by_workshop/${workshopCode}`);
        const orders = await response.json();
        
        const pending = orders.filter(o => o.status === 'Pending');
        const running = orders.filter(o => o.status.includes('Scheduled') || o.status === 'In Progress');
        const completed = orders.filter(o => o.status === 'Completed' || o.status === 'Done');
        const urgent = pending.filter(o => o.deadline && (new Date(o.deadline) - new Date() < 86400000));
        
        document.getElementById('statPending').textContent = pending.length;
        document.getElementById('statRunning').textContent = running.length;
        document.getElementById('statUrgent').textContent = urgent.length;
        document.getElementById('statCompleted').textContent = completed.length;
        document.getElementById('runningCount').textContent = running.length;
        
        const runningHtml = running.slice(0, 15).map(o => `
            <div class="work-order-item" style="border-left: 3px solid #238636;">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <div class="wo-id">${o.task_id}</div>
                        <div class="wo-product mt-1">${o.product_code || '-'} | ${o.resource_id || '自动分配'}</div>
                    </div>
                    <div class="text-end">
                        <div class="text-success fw-bold small mb-1">${o.qty} 台</div>
                        <span class="badge bg-success">已排产</span>
                    </div>
                </div>
            </div>
        `).join('');
        document.getElementById('runningOrdersList').innerHTML = runningHtml || '<div class="text-muted text-center p-4">暂无进行中工单</div>';
    } catch (error) {
        console.error('加载概览失败:', error);
    }
}

// === 加载产线状态 ===
async function loadLineStatus() {
    try {
        const response = await fetch('/api/resource_manage');
        const resources = await response.json();
        const typeMap = { 'SMT': 'SMT', 'DIP': 'DIP', 'ASSEMBLY': 'Production' };
        
        const lines = resources.filter(r => r.type === typeMap[workshopCode] || (workshopCode === 'ASSEMBLY' && r.id.startsWith('Line')));
        document.getElementById('lineCount').textContent = `${lines.length} 条产线`;
        
        const linesHtml = lines.map(line => `
            <div class="col-4 col-md-3 mb-3">
                <div class="text-center p-3" style="background: rgba(255,255,255,0.03); border-radius: 8px;">
                    <div class="line-status ${Math.random() > 0.3 ? 'running' : 'idle'}"></div>
                    <div class="mt-2" style="font-weight: 600;">${line.id}</div>
                </div>
            </div>
        `).join('');
        document.getElementById('lineStatusGrid').innerHTML = linesHtml;
    } catch (error) {}
}

// === 一键导出 Excel ===
function exportExcel() {
    // 利用原生的 window.location 跳转触发文件下载，workshopCode 是您顶部定义好的变量
    window.location.href = `/api/export_schedule_excel/${workshopCode}`;
}

// 初始化调用
loadMatrix();
loadOverview();
loadLineStatus();
setInterval(() => { loadMatrix(); loadOverview(); }, 30000);

</script>
</body>
</html>
