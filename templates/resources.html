<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>APS 产线资源配置</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏭</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .toolbar { background: #fff; padding: 15px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .table-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="toolbar sticky-top">
    <div class="d-flex align-items-center">
        <h4 class="m-0 me-4 text-primary"><i class="fas fa-cogs"></i> 产线资源配置</h4>
    </div>
    <div class="btn-group">
        <a href="/" class="btn btn-outline-secondary"><i class="fas fa-chart-gantt"></i> 返回看板</a>
        <a href="/manage" class="btn btn-outline-secondary"><i class="fas fa-list"></i> 订单管理</a>
        <button class="btn btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> 新增产线</button>
    </div>
</div>

<div class="container mt-4">
    <div class="table-container">
        <table class="table table-hover align-middle">
            <thead class="table-light">
                <tr>
                    <th>资源ID</th>
                    <th>产线名称</th>
                    <th>日工作时长 (h)</th>
                    <th>效率系数</th>
                    <th>描述/备注</th>
                    <th style="width: 150px;">操作</th>
                </tr>
            </thead>
            <tbody id="resTableBody">
                </tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="resModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">编辑产线</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="resForm">
                    <div class="mb-3">
                        <label class="form-label">资源ID (唯一编码)</label>
                        <input type="text" class="form-control" id="res_id" placeholder="例如：Line-01">
                        <div class="form-text">ID 创建后不可修改</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">产线名称</label>
                        <input type="text" class="form-control" id="res_name" placeholder="例如：总装线A">
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">日工作时长 (小时)</label>
                            <input type="number" class="form-control" id="res_hours" value="24" min="0" max="24">
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">效率系数 (1.0=标准)</label>
                            <input type="number" class="form-control" id="res_ratio" value="1.0" step="0.1">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">备注</label>
                        <textarea class="form-control" id="res_desc" rows="2"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveResource()">保存</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let resModal;
    let isEdit = false;

    document.addEventListener('DOMContentLoaded', function() {
        resModal = new bootstrap.Modal(document.getElementById('resModal'));
        loadData();
    });

    function loadData() {
        fetch('/api/resource_manage')
            .then(r => r.json())
            .then(data => {
                const tbody = document.getElementById('resTableBody');
                tbody.innerHTML = '';
                data.forEach(row => {
                    tbody.innerHTML += `
                        <tr>
                            <td><span class="badge bg-light text-dark border">${row.id}</span></td>
                            <td class="fw-bold text-primary">${row.name}</td>
                            <td>${row.work_hours || 24} 小时</td>
                            <td>
                                <span class="badge ${row.capacity_ratio >= 1 ? 'bg-success' : 'bg-warning text-dark'}">
                                    ${row.capacity_ratio || 1.0}x
                                </span>
                            </td>
                            <td class="text-muted small">${row.description || '-'}</td>
                            <td>
                                <button class="btn btn-sm btn-outline-primary me-1" onclick='openModal(${JSON.stringify(row)})'>
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteRes('${row.id}')">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            });
    }

    window.openModal = function(data = null) {
        if (data) {
            // 编辑模式
            isEdit = true;
            document.getElementById('modalTitle').innerText = "编辑产线";
            document.getElementById('res_id').value = data.id;
            document.getElementById('res_id').disabled = true; // ID不可改
            document.getElementById('res_name').value = data.name;
            document.getElementById('res_hours').value = data.work_hours;
            document.getElementById('res_ratio').value = data.capacity_ratio;
            document.getElementById('res_desc').value = data.description;
        } else {
            // 新增模式
            isEdit = false;
            document.getElementById('modalTitle').innerText = "新增产线";
            document.getElementById('resForm').reset();
            document.getElementById('res_id').disabled = false;
            document.getElementById('res_id').value = "Line-";
        }
        resModal.show();
    }

    window.saveResource = function() {
        const payload = {
            id: document.getElementById('res_id').value,
            name: document.getElementById('res_name').value,
            work_hours: document.getElementById('res_hours').value,
            capacity_ratio: document.getElementById('res_ratio').value,
            desc: document.getElementById('res_desc').value
        };

        if(!payload.id || !payload.name) {
            alert("ID和名称必填"); return;
        }

        fetch('/api/resource_manage', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        }).then(r => r.json()).then(d => {
            if(d.success) {
                resModal.hide();
                loadData();
            } else {
                alert("保存失败: " + d.message);
            }
        });
    }

    window.deleteRes = function(id) {
        if(!confirm(`确定删除产线 [${id}] 吗？\n注意：如果该产线下还有关联订单，将无法删除。`)) return;
        
        fetch(`/api/resource_manage?id=${id}`, { method: 'DELETE' })
            .then(r => r.json()).then(d => {
                if(d.success) {
                    loadData();
                } else {
                    alert("删除失败: " + d.message);
                }
            });
    }
</script>
</body>
</html>
